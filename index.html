<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ソウル大冒険 🇰🇷</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #0f0c29;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #game {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ========== HEADER ========== */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }
    .hearts { font-size: 1.1rem; letter-spacing: 2px; }
    .chapter-label { font-size: 0.75rem; color: #aaa; text-align: center; }
    .score-display { font-size: 1rem; }

    /* ========== SCENE ========== */
    #scene {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 260px;
    }

    #scene-gradient {
      position: absolute;
      inset: 0;
      transition: background 0.8s;
    }

    #scene-emojis {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      opacity: 0.2;
      user-select: none;
      letter-spacing: 16px;
    }

    #location-pill {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      color: #eee;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #character-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding-top: 20px;
    }

    #char-emoji {
      font-size: 5rem;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #char-name-tag {
      margin-top: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 0.78rem;
      color: #ccc;
    }

    /* ========== DIALOGUE ========== */
    #dialogue-panel {
      background: rgba(8, 6, 30, 0.96);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 16px 20px;
      min-height: 200px;
      z-index: 5;
    }

    #speaker-tag {
      font-size: 0.8rem;
      color: #c084fc;
      font-weight: bold;
      margin-bottom: 8px;
      min-height: 18px;
    }

    #korean-line {
      font-size: 1.35rem;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 4px;
      min-height: 28px;
    }

    #roman-line {
      font-size: 0.82rem;
      color: #6b7280;
      margin-bottom: 4px;
      min-height: 18px;
    }

    #japanese-line {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 12px;
      min-height: 20px;
    }

    #choices-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      padding: 12px 14px;
      color: white;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-size: 1rem;
    }
    .choice-btn:hover:not(:disabled) {
      background: rgba(124,77,255,0.25);
      border-color: #7c4dff;
      transform: translateX(3px);
    }
    .choice-btn .c-roman {
      display: block;
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 3px;
    }
    .choice-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; }
    .choice-btn.wrong   { background: rgba(239,68,68,0.2);  border-color: #ef4444; }

    #next-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    #next-btn:hover { opacity: 0.88; }

    /* ========== NARRATION OVERLAY ========== */
    #narration-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 120;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      text-align: center;
      cursor: pointer;
    }
    #narration-screen .n-emoji { font-size: 4.5rem; margin-bottom: 20px; }
    #narration-screen .n-text  { font-size: 1.05rem; line-height: 1.9; color: #cbd5e1; white-space: pre-line; max-width: 320px; }
    #narration-screen .n-hint  { margin-top: 32px; font-size: 0.8rem; color: #374151; }

    /* ========== WORD POPUP ========== */
    #word-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 140;
      display: none;
      cursor: pointer;
    }
    #word-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      background: linear-gradient(135deg, #1e1b4b, #3b0764);
      border: 2px solid #7c3aed;
      border-radius: 24px;
      padding: 28px 36px;
      text-align: center;
      z-index: 150;
      min-width: 220px;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    }
    #word-popup.open { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    #word-popup .wp-badge  { font-size: 0.72rem; color: #a78bfa; letter-spacing: 1px; margin-bottom: 10px; }
    #word-popup .wp-hangul { font-size: 2.8rem; color: #fff; font-weight: bold; }
    #word-popup .wp-roman  { font-size: 0.9rem; color: #6b7280; margin: 6px 0; }
    #word-popup .wp-mean   { font-size: 1.2rem; color: #c4b5fd; }
    #word-popup .wp-hint   { font-size: 0.72rem; color: #374151; margin-top: 14px; }

    /* ========== FEEDBACK TOAST ========== */
    #feedback-toast {
      position: fixed;
      bottom: 220px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,0.92);
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.9rem;
      z-index: 160;
      display: none;
      white-space: nowrap;
      max-width: 90%;
      white-space: normal;
      text-align: center;
    }

    /* ========== SCENE SUMMARY ========== */
    #summary-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #0f172a, #1e1b4b);
      z-index: 180;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 30px;
      overflow-y: auto;
    }
    #summary-screen h2 { font-size: 1.6rem; margin-bottom: 4px; }
    #summary-screen .s-sub { color: #6b7280; font-size: 0.85rem; margin-bottom: 24px; }
    .word-list { width: 100%; max-width: 340px; margin-bottom: 24px; }
    .word-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .word-row .wr-hangul { font-size: 1.3rem; }
    .word-row .wr-right  { text-align: right; }
    .word-row .wr-roman  { font-size: 0.72rem; color: #6b7280; }
    .word-row .wr-mean   { font-size: 0.9rem; color: #c4b5fd; }

    /* ========== TITLE SCREEN ========== */
    #title-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #0f0c29, #302b63, #1a0533);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
    }
    #title-screen h1 { font-size: 2.2rem; margin-bottom: 6px; }
    #title-screen .t-sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 28px; }
    .chapters-preview {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 24px;
      margin-bottom: 32px;
      text-align: left;
      width: 100%;
      max-width: 300px;
    }
    .chapters-preview div { font-size: 0.9rem; color: #cbd5e1; line-height: 2.2; }

    /* ========== END SCREEN ========== */
    #end-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #064e3b, #065f46, #047857);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      overflow-y: auto;
    }
    #end-screen h2 { font-size: 1.8rem; margin-bottom: 6px; }
    #end-screen .e-sub { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .stat-box {
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px 32px;
      margin-bottom: 20px;
    }
    .stat-num { font-size: 3rem; font-weight: bold; }
    .stat-label { font-size: 0.8rem; opacity: 0.7; }

    .action-btn {
      padding: 14px 36px;
      border: none;
      border-radius: 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.88; }
    .btn-white { background: white; color: #065f46; }
    .btn-purple { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }

    /* ========== NAV BUTTONS ========== */
    #nav-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-btn {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.18); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    @media (max-width: 380px) {
      #char-emoji { font-size: 4rem; }
      #korean-line { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
<div id="game">
  <div id="header">
    <div class="hearts" id="hearts-el">❤️❤️❤️</div>
    <div class="chapter-label" id="chapter-el">—</div>
    <div class="score-display">⭐ <span id="score-el">0</span></div>
  </div>
  <div id="nav-bar">
    <button class="nav-btn" id="btn-home" onclick="goHome()">🏠 ホーム</button>
    <button class="nav-btn" id="btn-back" onclick="goBack()">← 戻る</button>
  </div>

  <div id="scene">
    <div id="scene-gradient"></div>
    <div id="scene-emojis"></div>
    <div id="location-pill">📍 —</div>
    <div id="character-wrap">
      <div id="char-emoji">🧑</div>
      <div id="char-name-tag">—</div>
    </div>
  </div>

  <div id="dialogue-panel">
    <div id="speaker-tag"></div>
    <div id="korean-line"></div>
    <div id="roman-line"></div>
    <div id="japanese-line"></div>
    <div id="choices-wrap"></div>
    <button id="next-btn" style="display:none" onclick="advance()">続ける →</button>
  </div>
</div>

<!-- Narration -->
<div id="narration-screen" onclick="closeNarration()">
  <div class="n-emoji" id="n-emoji"></div>
  <div class="n-text"  id="n-text"></div>
  <div class="n-hint">タップして続ける</div>
</div>

<!-- Word popup -->
<div id="word-overlay" onclick="closeWordPopup()"></div>
<div id="word-popup">
  <div class="wp-badge">📖 新しい単語！</div>
  <div class="wp-hangul" id="wp-hangul"></div>
  <div class="wp-roman"  id="wp-roman"></div>
  <div class="wp-mean"   id="wp-mean"></div>
  <div class="wp-hint">タップして続ける</div>
</div>

<!-- Feedback -->
<div id="feedback-toast"></div>

<!-- Scene summary -->
<div id="summary-screen">
  <div style="font-size:3rem;margin-bottom:12px">🎉</div>
  <h2>シーン クリア！</h2>
  <div class="s-sub" id="s-location"></div>
  <div style="font-size:0.85rem;color:#94a3b8;margin-bottom:16px">このシーンで覚えた単語</div>
  <div class="word-list" id="s-words"></div>
  <button class="action-btn btn-purple" onclick="goNextScene()">次のシーンへ →</button>
</div>

<!-- Title -->
<div id="title-screen">
  <div style="font-size:4rem;margin-bottom:10px">🇰🇷</div>
  <h1>ソウル大冒険</h1>
  <div class="t-sub">韓国の街を旅しながら言葉を学ぼう</div>
  <div class="chapters-preview">
    <div>✈️ &nbsp;仁川空港 — 入国審査</div>
    <div>🏪 &nbsp;コンビニ — お買い物</div>
    <div>🗺️ &nbsp;道に迷う — 道を聞く</div>
    <div>🏨 &nbsp;ホテル — チェックイン</div>
    <div>🍜 &nbsp;食堂 — 새 친구と食事</div>
    <div>🛍️ &nbsp;南大門市場 — 値切り!</div>
  </div>
  <button class="action-btn btn-purple" onclick="startGame()" style="padding:16px 48px;font-size:1.1rem">
    冒険スタート！
  </button>
</div>

<!-- End -->
<div id="end-screen">
  <div style="font-size:4rem;margin-bottom:16px">🏆</div>
  <h2>クリア！おめでとう！</h2>
  <div class="e-sub">ソウル大冒険 完走</div>
  <div class="stat-box">
    <div class="stat-num" id="e-words">0</div>
    <div class="stat-label">単語をマスター</div>
  </div>
  <div class="stat-box" style="margin-bottom:24px">
    <div class="stat-num" id="e-score">0</div>
    <div class="stat-label">獲得ポイント</div>
  </div>
  <button class="action-btn btn-white" onclick="restartGame()">もう一度プレイ</button>
</div>

// ================================================================
// STATE
// ================================================================
let sIdx = 0;   // scene index
let stIdx = 0;  // step index
let hearts = 3;
let score = 0;
let learnedAll = [];
let pendingCb = null;

// ================================================================
// INIT
// ================================================================
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  el('nav-bar').style.display = 'flex';
  sIdx = 0; stIdx = 0; hearts = 3; score = 0;
  learnedAll = [];
  STORY.forEach(s => s.words = []);
  renderHeader();
  loadStep();
  updateNavButtons();
}

function restartGame() {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
}

// ================================================================
// HEADER
// ================================================================
function renderHeader() {
  const hMap = ['💔','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('hearts-el').textContent = hMap[Math.max(0, hearts)];
  document.getElementById('score-el').textContent = score;
  const s = STORY[sIdx];
  document.getElementById('chapter-el').textContent = s ? s.chapter + ' — ' + s.locationJa : '';
}

// ================================================================
// STEP LOADER
// ================================================================
function loadStep() {
  const scene = STORY[sIdx];
  const step  = scene.steps[stIdx];

  // Scene visuals
  document.getElementById('scene-gradient').style.background = scene.gradient;
  document.getElementById('scene-emojis').textContent = scene.bgEmoji;
  document.getElementById('location-pill').textContent = '📍 ' + scene.location;
  document.getElementById('char-emoji').textContent = scene.charEmoji;
  document.getElementById('char-name-tag').textContent = scene.charName;

  // Clear panel
  el('speaker-tag').textContent = '';
  el('korean-line').textContent = '';
  el('roman-line').textContent  = '';
  el('japanese-line').textContent = '';
  el('choices-wrap').innerHTML  = '';
  el('next-btn').style.display  = 'none';

  if (step.type === 'narration') {
    showNarration(step);
  } else if (step.type === 'talk') {
    maybeTaughtThen(step, () => renderTalk(step));
  } else if (step.type === 'choice') {
    maybeTaughtThen(step, () => renderChoice(step));
  }
}

// ================================================================
// NARRATION
// ================================================================
function showNarration(step) {
  el('n-emoji').textContent = step.emoji;
  el('n-text').textContent  = step.text;
  el('narration-screen').style.display = 'flex';
}
function closeNarration() {
  el('narration-screen').style.display = 'none';
  advance();
}

// ================================================================
// TALK (NPC dialogue)
// ================================================================
function renderTalk(step) {
  el('speaker-tag').textContent   = step.speaker;
  el('korean-line').textContent   = step.kr;
  el('roman-line').textContent    = step.ro;
  el('japanese-line').textContent = step.ja;
  el('next-btn').style.display    = 'block';
}

// ================================================================
// CHOICE
// ================================================================
function renderChoice(step) {
  el('speaker-tag').textContent   = step.speaker + ' 「?」';
  el('korean-line').textContent   = step.ja;
  el('roman-line').textContent    = step.kr ? '' : '';
  el('japanese-line').textContent = '▼ ' + step.prompt;

  const wrap = el('choices-wrap');
  wrap.innerHTML = step.choices.map((c, i) =>
    `<button class="choice-btn" id="cb${i}" onclick="pick(${i})">
      ${c.kr}
      <span class="c-roman">${c.ro}${c.ja ? ' — ' + c.ja : ''}</span>
    </button>`
  ).join('');
}

function pick(idx) {
  const step = STORY[sIdx].steps[stIdx];
  const c = step.choices[idx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  if (c.ok) {
    btns[idx].classList.add('correct');
    score += 10;
    renderHeader();
    setTimeout(() => advance(), 900);
  } else {
    btns[idx].classList.add('wrong');
    hearts = Math.max(0, hearts - 1);
    renderHeader();
    showToast(c.why || 'もう一度！');
    setTimeout(() => {
      btns.forEach(b => { b.disabled = false; b.classList.remove('correct','wrong'); });
    }, 1400);
  }
}

// ================================================================
// WORD POPUP
// ================================================================
function maybeTaughtThen(step, cb) {
  if (step.teach) {
    const w = step.teach;
    const scene = STORY[sIdx];
    if (!scene.words.find(x => x.h === w.h)) scene.words.push(w);
    if (!learnedAll.find(x => x.h === w.h)) learnedAll.push(w);
    showWordPopup(w, cb);
  } else {
    cb();
  }
}

function showWordPopup(w, cb) {
  pendingCb = cb;
  el('wp-hangul').textContent = w.h;
  el('wp-roman').textContent  = w.r;
  el('wp-mean').textContent   = w.m;
  el('word-overlay').style.display = 'block';
  requestAnimationFrame(() => el('word-popup').classList.add('open'));
}

function closeWordPopup() {
  el('word-popup').classList.remove('open');
  el('word-overlay').style.display = 'none';
  if (pendingCb) { const f = pendingCb; pendingCb = null; f(); }
}

// ================================================================
// FEEDBACK TOAST
// ================================================================
function showToast(msg) {
  const t = el('feedback-toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2200);
}

// ================================================================
// ADVANCE
// ================================================================
function advance() {
  stIdx++;
  const scene = STORY[sIdx];
  if (stIdx >= scene.steps.length) {
    showSummary();
  } else {
    loadStep();
  }
  updateNavButtons();
}

// ================================================================
// SCENE SUMMARY
// ================================================================
function showSummary() {
  const scene = STORY[sIdx];
  el('s-location').textContent = scene.location + ' — クリア！';
  el('s-words').innerHTML = scene.words.length
    ? scene.words.map(w =>
        `<div class="word-row">
          <div class="wr-hangul">${w.h}</div>
          <div class="wr-right">
            <div class="wr-roman">${w.r}</div>
            <div class="wr-mean">${w.m}</div>
          </div>
        </div>`).join('')
    : '<p style="text-align:center;color:#6b7280;padding:16px">このシーンで新単語はありませんでした</p>';
  el('summary-screen').style.display = 'flex';
}

function goNextScene() {
  el('summary-screen').style.display = 'none';
  sIdx++; stIdx = 0;
  if (sIdx >= STORY.length) {
    showEnd();
  } else {
    renderHeader();
    loadStep();
  }
}

// ================================================================
// END
// ================================================================
function showEnd() {
  el('e-words').textContent = learnedAll.length;
  el('e-score').textContent = score;
  el('end-screen').style.display = 'flex';
}

// ================================================================
// NAV BUTTONS
// ================================================================
function goHome() {
  if (!confirm('タイトルに戻りますか？（進行中のデータはリセットされます）')) return;
  el('narration-screen').style.display = 'none';
  el('summary-screen').style.display   = 'none';
  el('end-screen').style.display       = 'none';
  el('word-overlay').style.display     = 'none';
  el('word-popup').classList.remove('open');
  el('title-screen').style.display     = 'flex';
  el('nav-bar').style.display          = 'none';
}

function goBack() {
  if (stIdx <= 0 && sIdx <= 0) return;
  el('narration-screen').style.display = 'none';
  el('summary-screen').style.display   = 'none';
  el('word-overlay').style.display     = 'none';
  el('word-popup').classList.remove('open');
  if (stIdx > 0) {
    stIdx--;
  } else {
    sIdx--;
    stIdx = STORY[sIdx].steps.length - 1;
  }
  renderHeader();
  loadStep();
  updateNavButtons();
}

function updateNavButtons() {
  const backBtn = el('btn-back');
  if (backBtn) backBtn.disabled = (sIdx === 0 && stIdx === 0);
}

// ================================================================
// UTIL
// ================================================================
function el(id) { return document.getElementById(id); }
</script>
